name: Sync agent & release plugin

# Keeps this Decky plugin in lockstep with the agent in emerytech/couchside so
# the bundled fallback never goes stale and a release is cut automatically when
# the agent changes. Correctness does not depend on this: main.py fetches the
# CURRENT agent from main at install time, so a box is never downgraded even if
# a release lags. This workflow keeps the offline fallback + frontend fresh.
#
# Triggers:
#   - repository_dispatch (agent-updated): fired by couchside's notify-decky
#     workflow the moment agent/couchsided.py lands on main  -> instant release.
#   - schedule: daily safety net in case a dispatch was missed.
#   - workflow_dispatch: manual, with an optional force.
#   - push to this repo's main touching the plugin source itself.
#
# Uses only the built-in GITHUB_TOKEN (same-repo release + commit-back). No PAT
# or cross-repo secret is needed here, because the agent is pulled over the
# public raw URL.

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Release even if the agent is unchanged"
        type: boolean
        default: false
  repository_dispatch:
    types: [agent-updated]
  schedule:
    - cron: "17 9 * * *"
  push:
    branches: [main]
    paths:
      - "src/**"
      - "main.py"
      - "plugin.json"
      - "rollup.config.js"

permissions:
  contents: write

concurrency:
  group: decky-release
  cancel-in-progress: false

jobs:
  sync-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull the current agent from couchside main
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/emerytech/couchside/main/agent/couchsided.py \
            -o defaults/couchsided.py
          python3 -m py_compile defaults/couchsided.py   # never ship a broken bundle

      - name: Decide whether to release
        id: decide
        run: |
          agent_changed=false
          git diff --quiet -- defaults/couchsided.py || agent_changed=true
          release=false
          case "${{ github.event_name }}" in
            push|repository_dispatch|workflow_dispatch) release=true ;;
            schedule) [ "$agent_changed" = true ] && release=true ;;
          esac
          [ "${{ github.event.inputs.force }}" = "true" ] && release=true
          echo "agent_changed=$agent_changed" >> "$GITHUB_OUTPUT"
          echo "release=$release" >> "$GITHUB_OUTPUT"
          echo "event=${{ github.event_name }} agent_changed=$agent_changed release=$release"

      - name: Nothing to do
        if: steps.decide.outputs.release != 'true'
        run: echo "Agent unchanged on a non-forcing trigger; no release."

      - uses: pnpm/action-setup@v4
        if: steps.decide.outputs.release == 'true'
        with:
          version: 9

      - uses: actions/setup-node@v4
        if: steps.decide.outputs.release == 'true'
        with:
          node-version: 20
          cache: pnpm

      - name: Build & package
        if: steps.decide.outputs.release == 'true'
        id: build
        run: |
          pnpm install --frozen-lockfile
          npm version patch --no-git-tag-version >/dev/null   # unique tag per release
          version="$(node -p "require('./package.json').version")"
          agent_ver="$(grep -m1 '^VERSION' defaults/couchsided.py | cut -d'"' -f2)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "agent_ver=$agent_ver" >> "$GITHUB_OUTPUT"
          pnpm build
          # Layout Decky Loader + install.sh expect: a top-level Couchside/ dir.
          rm -rf pkg && mkdir -p pkg/Couchside
          cp -r LICENSE README.md plugin.json package.json main.py dist defaults pkg/Couchside/
          rm -f pkg/Couchside/dist/index.js.map
          # Store root ownership in the archive. Without this, tar records the CI
          # runner's UID/GID (1001) and `sudo tar -x` on-box preserves it, leaving
          # the plugin owned by a phantom user — Decky Loader then skips it at scan
          # (it only loads root-owned plugins). install.sh also re-chowns as a
          # belt-and-suspenders for any already-published archive.
          tar --owner=0 --group=0 --numeric-owner -C pkg -czf Couchside.tar.gz Couchside

      - name: Commit synced agent + version bump
        if: steps.decide.outputs.release == 'true'
        run: |
          git config user.name  "couchside-bot"
          git config user.email "actions@users.noreply.github.com"
          git add defaults/couchsided.py package.json
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "chore: sync bundled agent to ${{ steps.build.outputs.agent_ver }}, plugin ${{ steps.build.outputs.version }}"
            git push
          fi

      - name: Publish release
        if: steps.decide.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ steps.build.outputs.version }}"
          notes="Auto-built plugin bundling agent ${{ steps.build.outputs.agent_ver }}. On install the plugin fetches the current agent from main; this bundle is the offline fallback."
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" Couchside.tar.gz --clobber
          else
            gh release create "$tag" Couchside.tar.gz \
              --title "Couchside Decky plugin $tag" \
              --notes "$notes"
          fi
